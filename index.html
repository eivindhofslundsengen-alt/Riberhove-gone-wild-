<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
}

.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="video-container">
    <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
        Din nettleser støtter ikke video.
    </video>
</div>

</body>
</html>
